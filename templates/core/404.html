{% extends 'base.html' %}

{% block content %}
<style>
    .not-found-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 80vh;
        text-align: center;
    }
    .not-found-content {
        max-width: 500px;
        padding: 2rem;
    }
    .error-code {
        font-size: clamp(6rem, 15vw, 12rem);
        font-weight: 900;
        background: linear-gradient(135deg, #e50914, #ff6b6b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.5rem;
        animation: pulse-glow 2s ease-in-out infinite;
    }
    @keyframes pulse-glow {
        0%, 100% {
            text-shadow: 0 0 20px rgba(229, 9, 20, 0.3);
        }
        50% {
            text-shadow: 0 0 40px rgba(229, 9, 20, 0.6), 0 0 60px rgba(229, 9, 20, 0.4);
        }
    }
    .not-found-title {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        color: white;
        font-weight: 700;
        margin-bottom: 1rem;
        animation: fade-in-up 0.8s ease-out 0.2s both;
    }
    .not-found-desc {
        font-size: 1.1rem;
        color: #b3b3b3;
        margin-bottom: 2.5rem;
        animation: fade-in-up 0.8s ease-out 0.4s both;
    }
    .btn-primary {
        padding: 0.875rem 2.5rem;
        font-size: 1.1rem;
        font-weight: 700;
        border-radius: 8px;
        background: linear-gradient(135deg, #e50914, #ff6b6b);
        border: none;
        transition: all 0.3s ease;
        animation: fade-in-up 0.8s ease-out 0.6s both;
    }
    .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(229, 9, 20, 0.4);
        background: linear-gradient(135deg, #ff1e29, #ff8a8a);
    }
    .btn-primary:active {
        transform: translateY(-1px);
    }
    @keyframes fade-in-up {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    .floating-shapes {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
        z-index: -1;
    }
    .floating-shape {
        position: absolute;
        opacity: 0.05;
        animation: float 15s ease-in-out infinite;
    }
    @keyframes float {
        0%, 100% {
            transform: translateY(0) rotate(0deg);
        }
        50% {
            transform: translateY(-50px) rotate(180deg);
        }
    }
</style>

<div class="floating-shapes">
    <div class="floating-shape" style="top: 10%; left: 5%; font-size: 8rem; animation-delay: 0s;">🎬</div>
    <div class="floating-shape" style="top: 60%; left: 90%; font-size: 6rem; animation-delay: -5s;">📺</div>
    <div class="floating-shape" style="top: 80%; left: 15%; font-size: 7rem; animation-delay: -10s;">🎥</div>
    <div class="floating-shape" style="top: 30%; left: 80%; font-size: 5rem; animation-delay: -3s;">🍿</div>
</div>

<div class="container not-found-container">
    <div class="not-found-content">
        <div class="error-code">404</div>
        <h1 class="not-found-title">Oops! Page Not Found</h1>
        <p class="not-found-desc">
            The page you're looking for doesn't exist, has been moved, or was removed.
        </p>
        <a href="{% url 'index' %}" class="btn btn-primary">
            <i class="fas fa-home me-2"></i> Back to Home
        </a>
    </div>
</div>
{% endblock %}
