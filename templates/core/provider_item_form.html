{% extends 'base.html' %}
{% block content %}
<div class="container mt-5 mb-5" style="max-width: 720px;">
    <div class="card bg-dark border-secondary">
        <div class="card-body">
            <h1 class="text-white h4 mb-4">Edit Provider</h1>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label text-light">Name</label>
                    {{ form.name }}
                </div>
                <div class="mb-3">
                    <label class="form-label text-light">Slug</label>
                    {{ form.slug }}
                </div>
                <div class="form-check mb-4">
                    {{ form.is_enabled }}
                    <label class="form-check-label text-light" for="id_is_enabled">Enabled</label>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a href="{% url 'provider_item_list' %}" class="btn btn-outline-light">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
