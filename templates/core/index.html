{% extends 'base.html' %}

{% block content %}
<div id="home-shell" class="py-5 text-center">
    <div class="container">
        <h1 class="hero-title mb-3">Loading your homepage...</h1>
        <p class="text-muted mb-0">The page shell is ready. Content is loading in the background.</p>
    </div>
</div>

<div id="home-content" aria-live="polite"></div>

<script>
let autoScrollIntervals = [];

document.addEventListener('DOMContentLoaded', () => {
    loadHomeContent();
});

function loadHomeContent() {
    fetch('{% url "home_initial_data" %}', {
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Homepage data request failed');
        }
        return response.json();
    })
    .then(data => {
        const shell = document.getElementById('home-shell');
        const content = document.getElementById('home-content');

        if (shell) shell.style.display = 'none';
        content.innerHTML = data.html || '<div class="container py-5 text-center text-muted">No content available right now.</div>';
        initializeHomeRows();

        if (typeof initScrollButtons === 'function') {
            initScrollButtons();
        }
    })
    .catch(error => {
        console.error('Error loading homepage content:', error);
        const content = document.getElementById('home-content');
        content.innerHTML = '<div class="container py-5 text-center text-danger">Unable to load homepage content. Please refresh the page.</div>';
    });
}

function initializeHomeRows() {
    autoScrollIntervals.forEach(intervalId => clearInterval(intervalId));
    autoScrollIntervals = [];

    const rowContainers = document.querySelectorAll('.row-container');

    rowContainers.forEach(container => {
        const scrollContainer = container.querySelector('.scroll-container');
        const rowId = container.dataset.rowId;
        let currentPage = parseInt(container.dataset.currentPage || '1');
        const totalPages = parseInt(container.dataset.totalPages || '1');
        let isLoading = false;

        if (!scrollContainer) return;

        scrollContainer.addEventListener('scroll', () => {
            const scrollLeft = scrollContainer.scrollLeft;
            const scrollWidth = scrollContainer.scrollWidth;
            const clientWidth = scrollContainer.clientWidth;

            if (rowId && scrollLeft + clientWidth >= scrollWidth * 0.8 && !isLoading && currentPage < totalPages) {
                isLoading = true;
                loadMoreContent(container, rowId, currentPage + 1)
                    .finally(() => {
                        currentPage++;
                        container.dataset.currentPage = currentPage;
                        isLoading = false;
                    });
            }
        });

        if (container.dataset.autoScroll === 'true') {
            let scrollDirection = 1;
            const scrollSpeed = 1;

            const autoScroll = () => {
                const scrollLeft = scrollContainer.scrollLeft;
                const scrollWidth = scrollContainer.scrollWidth;
                const clientWidth = scrollContainer.clientWidth;

                if (scrollLeft >= scrollWidth - clientWidth - 10) {
                    scrollDirection = -1;
                } else if (scrollLeft <= 10) {
                    scrollDirection = 1;
                }

                scrollContainer.scrollLeft += scrollDirection * scrollSpeed;
            };

            let intervalId = setInterval(autoScroll, 50);
            autoScrollIntervals.push(intervalId);

            container.addEventListener('mouseenter', () => {
                clearInterval(intervalId);
            });

            container.addEventListener('mouseleave', () => {
                intervalId = setInterval(autoScroll, 50);
                autoScrollIntervals.push(intervalId);
            });
        }
    });
}

function loadMoreContent(container, rowId, page) {
    if (container.dataset.isLoading === 'true') return Promise.resolve();

    container.dataset.isLoading = 'true';
    const scrollContainer = container.querySelector('.scroll-container');

    return fetch(`{% url 'load_more_row_content' 0 %}`.replace('0', rowId) + `?page=${page}`, {
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.html) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = data.html;
            while (tempDiv.firstChild) {
                scrollContainer.appendChild(tempDiv.firstChild);
            }
        }

        if (data.totalPages) {
            container.dataset.totalPages = data.totalPages;
        }

        if (typeof initScrollButtons === 'function') {
            initScrollButtons();
        }
    })
    .catch(error => {
        console.error('Error loading more content:', error);
    })
    .finally(() => {
        container.dataset.isLoading = 'false';
    });
}
</script>
{% endblock %}
